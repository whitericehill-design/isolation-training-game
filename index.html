<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>隔离防护培训</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{--turquoise:#00a8b5;--coral:#ff6b6b;--yellow:#ffd166;--green:#06d6a0;--blue:#457b9d;--pink:#ff8fa3;--text:#2d2d2d;--sub:#6b6b6b;}
  body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#fefae0;overflow:hidden;height:100vh;}

  /* ── 天空 ────────────────────────── */
  .sky{position:fixed;top:0;left:0;right:0;height:45%;transition:background 1.5s;z-index:0;}
  .sky.morning{background:linear-gradient(180deg,#a8dadc 0%,#c9e4de 40%,#e8f0e8 100%);}
  .sky.noon{background:linear-gradient(180deg,#fdf0d5 0%,#fce8c4 50%,#fefae0 100%);}
  .sky.evening{background:linear-gradient(180deg,#ffd166 0%,#f4a261 30%,#e9a87c 60%,#d4a08a 100%);}
  .sun{position:fixed;width:48px;height:48px;border-radius:50%;background:var(--yellow);transition:left 1.5s,top 1.5s,opacity 1.5s;z-index:0;box-shadow:0 0 40px rgba(255,209,102,.6);}

  /* ── 远山 ────────────────────────── */
  .hills{position:fixed;top:38%;left:0;right:0;height:12%;z-index:0;opacity:.7;}
  .hills svg{width:100%;height:100%;}

  /* ── 云 ──────────────────────────── */
  .cloud{position:fixed;z-index:0;opacity:.85;animation:drift linear infinite;pointer-events:none;}
  @keyframes drift{from{transform:translateX(0)}to{transform:translateX(120vw)}}
  .cloud svg{width:120px;height:50px;}

  /* ── 地面 ────────────────────────── */
  .ground{position:fixed;bottom:0;left:0;right:0;height:42%;z-index:1;
    background:linear-gradient(180deg,#d4c8a8 0%,#c8b888 30%,#b8a878 70%,#a89868 100%);}
  .ground::before{
    content:'';position:absolute;top:0;left:0;right:0;height:8px;
    background:linear-gradient(90deg,#9ab87a 0%,#8aac6e 20%,#9ab87a 40%,#8aac6e 60%,#9ab87a 80%,#8aac6e 100%);
  }
  /* 草地纹理 */
  .grass{position:fixed;bottom:42%;left:0;right:0;height:20px;z-index:2;
    background:linear-gradient(180deg,#8ab86a 0%,#7aaa5e 50%,#9ab87a 100%);
    -webkit-mask-image:repeating-linear-gradient(90deg,transparent,transparent 6px,#000 6px,#000 7px);}
  .grass2{position:fixed;bottom:42.5%;left:0;right:0;height:12px;z-index:2;
    background:linear-gradient(180deg,#92c070 0%,#8ab86a 100%);
    -webkit-mask-image:repeating-linear-gradient(105deg,transparent,transparent 8px,#000 8px,#000 9px);}

  /* ── 路 ──────────────────────────── */
  .path{position:fixed;bottom:28%;left:0;right:0;height:14%;z-index:3;
    background:linear-gradient(180deg,#e8dcc8,#ddd0b8 30%,#d4c8a8 60%,#ccc098);
    clip-path:polygon(0 15%,3% 0,97% 0,100% 15%,100% 100%,0 100%);}

  /* ── 医院建筑 ────────────────────── */
  .hospital{position:fixed;top:18%;right:5%;z-index:2;display:flex;align-items:flex-end;gap:4px;}
  .h-wing{background:#f0ebe0;border:2px solid rgba(0,0,0,.12);border-radius:3px 3px 0 0;}
  .h-wing .h-win{
    display:block;background:rgba(168,218,220,.5);border:1px solid rgba(0,0,0,.08);
    margin:3px 4px;border-radius:1px;
  }
  .h-sign{
    align-self:flex-start;margin-right:4px;font-size:10px;font-weight:700;color:var(--text);
    background:#fff;border:1.5px solid rgba(0,0,0,.1);padding:2px 6px;border-radius:3px;
  }

  /* ── 树 ──────────────────────────── */
  .tree{position:fixed;z-index:3;display:flex;flex-direction:column;align-items:center;pointer-events:none;}
  .tree .trunk{width:8px;background:linear-gradient(180deg,#8a6a4a,#6a4a2a);border-radius:3px;}
  .tree .canopy{
    border-radius:50%;background:linear-gradient(135deg,#7ab85a,#5a9840);
    border:2px solid rgba(0,0,0,.08);margin-top:-5px;
  }

  /* ── 花丛 ────────────────────────── */
  .bush{position:fixed;z-index:3;pointer-events:none;}
  .bush .blob{border-radius:50% 50% 35% 35%;background:#6ab84a;border:1.5px solid rgba(0,0,0,.06);display:inline-block;}
  .bush .dot{width:6px;height:6px;border-radius:50%;position:absolute;}

  /* ── 鸟 ──────────────────────────── */
  .bird{position:fixed;z-index:1;pointer-events:none;animation:birdFly linear infinite;}
  @keyframes birdFly{0%{transform:translate(0,0)}25%{transform:translate(15vw,-30px)}50%{transform:translate(30vw,0)}75%{transform:translate(15vw,30px)}100%{transform:translate(0,0)}}

  /* ── 角色 ────────────────────────── */
  .char{position:fixed;bottom:32%;transition:left .8s cubic-bezier(.25,.46,.45,.94);z-index:10;display:flex;flex-direction:column;align-items:center;}
  .char .head{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#fecaca,#fca5a5);display:flex;align-items:center;justify-content:center;font-size:22px;border:3px solid rgba(0,0,0,.12);}
  .char .body{width:26px;height:32px;border-radius:10px 10px 6px 6px;background:linear-gradient(180deg,#f8fafc,#e2e8f0);margin-top:-3px;border:3px solid rgba(0,0,0,.08);}
  .char.walking .head{animation:bob .3s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

  .npc{
    position:fixed;bottom:32%;z-index:9;display:flex;flex-direction:column;align-items:center;
    transition:opacity .5s;
  }
  .npc .nhead{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#fde68a,#fcd34d);display:flex;align-items:center;justify-content:center;font-size:24px;border:3px solid rgba(0,0,0,.12);}
  .npc .nbody{width:28px;height:36px;border-radius:12px 12px 6px 6px;background:linear-gradient(180deg,#bfdbfe,#93c5fd);margin-top:-3px;border:3px solid rgba(0,0,0,.08);}

  /* ── 对话气泡(场景内) ────────────── */
  .scene-bubble{
    position:fixed;bottom:46%;z-index:20;background:#fffef5;border:3px solid rgba(0,0,0,.14);
    border-radius:14px;padding:16px 20px;max-width:72%;box-shadow:4px 4px 0 rgba(0,0,0,.06);
    animation:bubIn .3s ease;display:none;
    left:50%;transform:translateX(-50%);
  }
  .scene-bubble::after{
    content:'';position:absolute;bottom:-14px;left:40px;width:0;height:0;
    border-left:10px solid transparent;border-right:10px solid transparent;
    border-top:14px solid rgba(0,0,0,.14);
  }
  .scene-bubble .b-speaker{font-size:11px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:6px;}
  .scene-bubble .b-text{font-size:14px;color:var(--text);line-height:1.7;min-height:20px;}
  .scene-bubble.show{display:block;}
  @keyframes bubIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

  /* ── 选项(场景内) ────────────────── */
  .scene-choices{
    position:fixed;bottom:20%;z-index:20;display:none;flex-direction:column;gap:8px;
    left:50%;transform:translateX(-50%);width:78%;max-width:500px;
  }
  .scene-choices.show{display:flex;}
  .sc-btn{
    width:100%;padding:11px 14px;text-align:left;
    border:2.5px solid rgba(0,0,0,.14);border-radius:10px;
    background:rgba(255,255,253,.85);cursor:pointer;font-size:13px;font-family:inherit;
    transition:all .12s;color:var(--text);backdrop-filter:blur(4px);
  }
  .sc-btn:hover{border-color:var(--blue);background:#f0f8fc;}
  .sc-btn:disabled{pointer-events:none;opacity:.45;}
  .sc-btn .sl{font-weight:700;margin-right:5px;color:var(--turquoise);}
  .sc-btn.selected-correct{border-color:var(--green);background:#e0faf0;}
  .sc-btn.selected-wrong{border-color:var(--coral);background:#ffe8e8;}
  .sc-btn.show-correct{border-color:var(--green);border-style:dashed;}

  /* ── 反馈横幅 ────────────────────── */
  .scene-fb{
    position:fixed;bottom:36%;z-index:20;display:none;
    left:50%;transform:translateX(-50%);width:78%;max-width:500px;
    padding:10px 14px;border-radius:8px;font-size:12px;
  }
  .scene-fb.show{display:block;animation:bubIn .3s ease;}
  .scene-fb.ok{background:#e0faf0;border:2px solid var(--green);}
  .scene-fb.err{background:#ffe8e8;border:2px solid var(--coral);}

  .scene-next{
    position:fixed;bottom:22%;z-index:21;display:none;
    right:11%;padding:9px 22px;background:var(--turquoise);color:#fff;
    border:2.5px solid var(--blue);border-radius:10px;
    font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;
    box-shadow:3px 3px 0 rgba(0,0,0,.06);
  }
  .scene-next.show{display:block;}
  .scene-next:hover{background:var(--blue);}

  /* ── HUD ─────────────────────────── */
  .hud{position:fixed;top:0;left:0;right:0;z-index:30;padding:6px 14px;display:flex;justify-content:space-between;align-items:center;background:rgba(254,250,224,.88);border-bottom:2px solid rgba(0,0,0,.06);font-size:13px;}
  .risk-wrap{position:fixed;top:34px;left:16px;right:16px;z-index:30;display:flex;align-items:center;gap:6px;font-size:10px;}
  .r-out{flex:1;height:4px;background:#e8e4d0;border-radius:2px;overflow:hidden;}
  .r-in{height:100%;border-radius:2px;transition:width .5s,background .5s;background:var(--green);}
  .r-in.warn{background:var(--yellow);}.r-in.danger{background:var(--coral);animation:pulse .6s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  /* ── 开场 ────────────────────────── */
  .intro-ov{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);}
  .intro-cd{background:#fefae0;border:3.5px solid rgba(0,0,0,.15);border-radius:16px;padding:30px 26px;max-width:340px;text-align:center;animation:popIn .35s ease;box-shadow:5px 5px 0 rgba(0,0,0,.06);}
  @keyframes popIn{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
  .intro-cd h1{font-size:20px;color:var(--text);margin:6px 0 4px;}
  .intro-cd .i-sub{font-size:11px;color:var(--sub);margin-bottom:14px;}
  .intro-cd input{width:100%;padding:9px;border:2.5px solid rgba(0,0,0,.1);border-radius:8px;font-size:14px;font-family:inherit;text-align:center;outline:none;margin-bottom:10px;background:rgba(255,255,255,.6);}
  .intro-cd input:focus{border-color:var(--blue);}
  .intro-cd .i-btn{width:100%;padding:11px;background:var(--turquoise);color:#fff;border:2.5px solid var(--blue);border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}

  /* ── 爆表 ────────────────────────── */
  .out-ov{display:none;position:fixed;inset:0;z-index:200;background:rgba(170,30,30,.92);align-items:center;justify-content:center;backdrop-filter:blur(4px);}
  .out-ov.active{display:flex;}
  .out-cd{background:#fefae0;border:3.5px solid rgba(0,0,0,.15);border-radius:16px;padding:32px 24px;max-width:340px;text-align:center;animation:popIn .35s ease;}
  .out-cd h2{font-size:18px;color:var(--coral);margin:6px 0;}
  .out-cd .o-btn{padding:10px 24px;background:var(--coral);color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
</style>
</head>
<body>

<svg width="0" height="0"><defs>
  <filter id="wobble"><feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="1.5"/></filter>
</defs></svg>

<!-- 天空 -->
<div class="sky morning" id="sky"></div>
<div class="sun" id="sun" style="left:12%;top:8%;"></div>

<!-- 远山 -->
<div class="hills"><svg viewBox="0 0 1200 80" preserveAspectRatio="none"><path d="M0,80 L0,40 Q60,10 120,35 Q180,20 240,45 Q300,15 360,38 Q420,25 480,32 Q540,10 600,40 Q660,20 720,35 Q780,10 840,42 Q900,25 960,30 Q1020,15 1080,38 Q1140,22 1200,50 L1200,80 Z" fill="rgba(0,0,0,.06)"/></svg></div>

<!-- 云 -->
<div class="cloud" style="top:12%;left:-10%;animation-duration:90s;"><svg viewBox="0 0 120 50"><path d="M20,40 Q10,25 30,20 Q35,8 55,15 Q70,5 90,18 Q110,10 115,35 Q120,45 100,45 L20,45 Z" fill="rgba(255,255,255,.7)" stroke="rgba(0,0,0,.1)" stroke-width="1.5"/></svg></div>
<div class="cloud" style="top:18%;left:40%;animation-duration:110s;animation-delay:-30s;"><svg viewBox="0 0 100 40"><path d="M15,35 Q8,22 25,18 Q30,8 48,14 Q60,5 78,16 Q92,10 95,30 Q98,38 82,38 L15,38 Z" fill="rgba(255,255,255,.6)" stroke="rgba(0,0,0,.08)" stroke-width="1.5"/></svg></div>

<!-- 鸟 -->
<div class="bird" style="top:20%;left:20%;animation-duration:14s;font-size:18px;">🐦</div>
<div class="bird" style="top:15%;left:60%;animation-duration:18s;animation-delay:-6s;font-size:14px;">🐦</div>

<!-- 地面 -->
<div class="ground"></div>
<div class="grass"></div>
<div class="grass2"></div>
<div class="path"></div>

<!-- 医院建筑 -->
<div class="hospital" style="top:19%;right:6%;">
  <span class="h-sign">🏥</span>
  <div class="h-wing" style="width:60px;height:90px;">
    <span class="h-win" style="width:20px;height:16px;"></span>
    <span class="h-win" style="width:20px;height:16px;"></span>
    <span class="h-win" style="width:20px;height:16px;"></span>
  </div>
  <div class="h-wing" style="width:50px;height:70px;">
    <span class="h-win" style="width:18px;height:14px;"></span>
    <span class="h-win" style="width:18px;height:14px;"></span>
  </div>
</div>

<!-- 树 -->
<div class="tree" style="left:8%;top:30%;"><div class="trunk" style="height:50px;"></div><div class="canopy" style="width:55px;height:55px;"></div></div>
<div class="tree" style="left:25%;top:28%;"><div class="trunk" style="height:40px;"></div><div class="canopy" style="width:45px;height:45px;"></div></div>
<div class="tree" style="left:72%;top:30%;"><div class="trunk" style="height:55px;"></div><div class="canopy" style="width:60px;height:60px;"></div></div>
<div class="tree" style="left:88%;top:32%;"><div class="trunk" style="height:35px;"></div><div class="canopy" style="width:40px;height:40px;"></div></div>

<!-- 花丛 -->
<div class="bush" style="left:15%;bottom:40%;"><span class="blob" style="width:30px;height:20px;"></span><span class="blob" style="width:22px;height:16px;margin-left:-8px;"></span></div>
<div class="bush" style="left:55%;bottom:41%;"><span class="blob" style="width:35px;height:22px;"></span><span class="blob" style="width:24px;height:18px;margin-left:-6px;"></span></div>
<div class="bush" style="left:80%;bottom:40%;"><span class="blob" style="width:28px;height:18px;"></span></div>

<!-- HUD -->
<div class="hud">
  <span style="font-weight:700">🏥 隔离防护培训</span>
  <span>✅<span id="ok" style="color:var(--green);font-weight:700">0</span> ❌<span id="bad" style="color:var(--coral);font-weight:700">0</span> ⭐<span id="sc" style="color:#b8860b;font-weight:700">0</span></span>
</div>
<div class="risk-wrap">🦠<span class="r-out"><span class="r-in" id="rIn" style="width:0%"></span></span><span id="rPct" style="font-weight:700;color:var(--green);font-size:9px">0%</span></div>

<!-- 护士 -->
<div class="npc" id="npc" style="left:5%;"></div>
<!-- 角色 -->
<div class="char" id="ch" style="left:3%;"></div>

<!-- 场景对话气泡 -->
<div class="scene-bubble" id="bub">
  <div class="b-speaker" id="bSpk"></div>
  <div class="b-text" id="bTxt"></div>
</div>

<!-- 场景选项 -->
<div class="scene-choices" id="sCh"></div>

<!-- 反馈 -->
<div class="scene-fb" id="sFb"></div>
<button class="scene-next" id="sNext" onclick="continueGame()">继续 ▸</button>

<!-- 开场 -->
<div class="intro-ov" id="introOv">
  <div class="intro-cd">
    <div style="font-size:44px">🏥</div>
    <h1>隔离防护培训</h1>
    <div class="i-sub">沿着医院小路 · 边散步边学习</div>
    <input type="text" id="pName" placeholder="你的名字" value="小李" maxlength="10">
    <button class="i-btn" onclick="startGame()">开始散步 ▸</button>
  </div>
</div>

<!-- 爆表 -->
<div class="out-ov" id="outOv">
  <div class="out-cd">
    <div style="font-size:52px">⚠️</div>
    <h2>院内感染爆发！</h2>
    <p style="font-size:13px;color:#666;margin:6px 0 14px">感染风险达到<b style="color:var(--coral)">100%</b></p>
    <button class="o-btn" onclick="restartGame()">🔄 重新开始</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════
//  数据
// ═══════════════════════════════════════
const CH={
  '王老师':{c:'#3b82f6',a:'👩‍⚕️',r:'护士长'},
  '{name}':{c:'#22c55e',a:'🧑‍⚕️',r:'实习生'},
  '患者':{c:'#f59e0b',a:'😷',r:'患者'},
};

// 7个场景的位置（路上均匀分布）
const SPOTS=[14,24,34,44,54,64,74]; // left百分比

const ST={
  prologue:{p:null,d:[
    {s:'王老师',t:'{name}，欢迎来到医院实习。沿着这条小路，我会带你经历七个临床场景。'},
    {s:'王老师',t:'记住两件事：<b>保护患者不受感染</b>，和<b>保护自己不被暴露</b>。我们边走边聊。'},
  ],ch:[{t:'我准备好了，出发吧！',ok:true,sc:0,nx:'scene1'}]},

  scene1:{p:{n:'病区环境',tp:37.0,hr:80,sp:98,cd:'你的双手是病原体最常见的传播媒介'},d:[
    {s:'王老师',t:'病房里住着术后患者、化疗患者——免疫系统很脆弱。你手上看不见的细菌，对他们可能是致命的。'},
    {s:'王老师',t:'进病房之前，你应该怎么做？'},
  ],kb:'<b>📖 手卫生</b><br>WHO五大时刻：接触患者前、无菌操作前、接触体液后、接触患者后、接触环境后。',
  ch:[
    {t:'用速干手消毒剂，六步洗手法认真揉搓',ok:true,sc:10,fb:'✅ 手卫生是保护患者最基础也最重要的防线。',nx:'scene2'},
    {t:'戴手套就行，不用洗手',ok:false,sc:-5,rk:10,ef:{tp:'+0.3',hr:'+5',sp:'-1',cd:'⚠ 手套可能有微小破损'},fb:'❌ 手不干净，戴手套的过程就会污染手套外表面。',nx:'scene2'},
    {t:'我只是去看看，不碰患者不用洗',ok:false,sc:-5,rk:15,ef:{tp:'+0.5',hr:'+8',sp:'-2',cd:'病原体可通过环境表面传播'},fb:'❌ 即使不直接接触患者，也会接触门把手、床栏。',nx:'scene2'},
  ]},

  scene2:{p:{n:'302床·MRSA感染',tp:37.8,hr:88,sp:96,cd:'隔壁303床是肾移植术后，使用免疫抑制剂'},d:[
    {s:'王老师',t:'302床MRSA。隔壁303床刚做完肾移植，在吃免疫抑制剂。如果你把MRSA带过去——'},
    {s:'王老师',t:'查体时你需要怎么防护？'},
  ],kb:'<b>📖 隔离感染源</b><br>多重耐药菌通过接触传播。隔离不仅保护自己，更是保护其他患者。手套+隔离衣+物品专用。',
  ch:[
    {t:'手套+隔离衣，出病房立即脱去洗手，物品专用',ok:true,sc:10,fb:'✅ 隔离感染源是保护其他患者的关键。',nx:'scene3'},
    {t:'戴手套就行，隔离衣太麻烦了',ok:false,sc:-5,rk:15,ef:{tp:'+0.5',hr:'+10',sp:'-1',cd:'MRSA可能沾染白大褂'},fb:'❌ 白大褂袖子接触床单后，穿着同一件进303床。',nx:'scene3'},

    {t:'穿防护服，口罩无所谓',ok:false,sc:-5,rk:20,ef:{tp:'+0.3',hr:'+6',sp:'-2',cd:'防护服对空气传播无效'},fb:'❌ 空气传播的防护核心是呼吸防护（N95），不是隔离衣。',nx:'scene5'},

    {s:'王老师',t:'{name}，防护用品——你穿对了吗？脱对了吗？很多人防护失败不是没穿，而是穿脱顺序错了。'},
  ],kb:'<b>📖 PPE穿脱顺序</b><br><b>穿（清洁→污染）</b>：洗手→隔离衣→口罩→护目镜→手套<br><b>脱（污染→清洁）</b>：手套→护目镜→隔离衣→口罩→洗手',
  ch:[
    {t:'穿：洗手→隔离衣→口罩→护目镜→手套 | 脱相反',ok:true,sc:10,fb:'✅ 脱卸每一步之间都要洗手——最容易忽略但最关键。',nx:'scene6'},
    {t:'穿：口罩→手套→隔离衣→护目镜',ok:false,sc:-5,rk:15,ef:{tp:'+0.3',hr:'+5',sp:'-1',cd:'顺序混乱导致交叉污染'},fb:'❌ 先戴手套可能污染口罩和隔离衣。隔离衣应在手套之前。',nx:'scene6'},
    {t:'脱：先摘口罩再脱手套，反正都要扔',ok:false,sc:-8,rk:25,ef:{tp:'+0.6',hr:'+10',sp:'-3',cd:'⚠ 脱卸顺序错误导致自我污染'},fb:'❌ 手套最脏，必须先脱！先摘口罩污染物可能飞溅面部。',nx:'scene6'},
  ]},

  scene6:{p:{n:'乙肝携带者',tp:36.8,hr:78,sp:97,cd:'HBsAg+。HBV体外可存活至少7天'},d:[
    {s:'患者',t:'医生，输液完了，帮我拔一下针，谢谢。'},
    {s:'王老师',t:'（在整理推车，背对着你）'},
  ],na:'<b>⚡ 拔针瞬间——针头回弹，刺中左手食指！</b>伤口渗血。患者是乙肝携带者。老师没看到。',
  kb:'<b>📖 职业暴露处理</b><br>一挤（近心端→远心端）、二冲（流动水3-5min）、三消（碘伏）、四报（院感科）、五评（风险）。HIV暴露2h内服药。',
  ch:[
    {t:'立即挤血→冲洗→碘伏消毒→同时呼叫老师→报告院感科',ok:true,sc:10,fb:'✅ 分秒必争！每一秒都在减少病毒进入血液的机会。',nx:'scene7'},
    {t:'伤口很小，贴创可贴继续工作',ok:false,sc:-10,rk:40,ef:{tp:'+0.2',hr:'+5',sp:'-1',cd:'⚠ 职业暴露未处理！HBV针刺风险约30%'},fb:'❌ <b>极度危险。</b>HBV针刺传播风险约30%。',nx:'scene7'},
    {t:'先找王老师报告，等她处理',ok:false,sc:-3,rk:10,ef:{tp:'+0.1',hr:'+3',sp:'0',cd:'耽误了伤口处理黄金时间'},fb:'不全面。报告是对的，但伤口处理优先级更高。一边挤血一边呼救。',nx:'scene7'},
  ]},

  scene7:{p:{n:'培训收尾',tp:36.5,hr:72,sp:99,cd:'医疗废物处理是最后一步——也是最容易被忽略的'},d:[
    {s:'王老师',t:'{name}，最后一步。用过的棉签、手套、输液器、针头——怎么处理？'},
    {s:'王老师',t:'记住，保洁人员、转运人员——他们的安全也取决于你的这一步。'},
  ],kb:'<b>📖 医疗废物</b><br>感染性废物：双层黄袋、鹅颈扎口、标注日期<br>损伤性废物：利器盒<br>谁产生、谁分类、谁负责。',
  ch:[
    {t:'分类：损伤性入利器盒+感染性双层黄袋+标注+专人转运',ok:true,sc:10,fb:'✅ 你正确处理的每一件废物，都保护了一个你不认识的人。',nx:'ending'},
    {t:'反正要焚烧，混一起扔垃圾桶就行',ok:false,sc:-8,rk:30,ef:{tp:'+0.5',hr:'+10',sp:'-3',cd:'⚠ 保洁人员面临针刺伤'},fb:'❌ 混放的针头可能刺伤保洁。谁产生谁分类谁负责。',nx:'ending'},
    {t:'有垃圾袋就行，单层双层区别不大',ok:false,sc:-5,rk:15,ef:{tp:'+0.3',hr:'+5',sp:'-1',cd:'单层袋易在转运中破裂'},fb:'不全面。感染性废物必须双层包装——单层破损污染整条转运路线。',nx:'ending'},
  ]},

  ending:{p:null,d:[
    {s:'王老师',t:'{name}，七步都走完了。记住两件事——'},
    {s:'王老师',t:'<b>保护患者</b>：你的双手可以治愈，也可以传播。'},
    {s:'王老师',t:'<b>保护自己</b>：标准预防是底线，知道传播途径就升级，暴露后分秒必争。'},
  ],ed:true},
};

// ═══════════════════════════════════════
//  状态
// ═══════════════════════════════════════
let pn='',curS=null,curSpot=-1,tSc=0,okN=0,bdN=0,iR=0,curP=null,ans=false,shCh=[],pnx=null;
const gs=(id)=>ST[id];const an=(t)=>t.replace(/\{name\}/g,pn||'小李');const rv=(v)=>Math.round(v*10)/10;
const sh=(a)=>{const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;};

// ═══════════════════════════════════════
//  场景引擎
// ═══════════════════════════════════════
function goScene(sid){
  const sc=gs(sid);if(!sc)return;
  curS=sc;ans=false;curP=null;
  document.getElementById('sCh').classList.remove('show');document.getElementById('sCh').innerHTML='';
  document.getElementById('sFb').classList.remove('show','ok','err');document.getElementById('sFb').innerHTML='';
  document.getElementById('sNext').classList.remove('show');
  document.getElementById('bub').classList.remove('show');

  if(sc.p){curP=JSON.parse(JSON.stringify(sc.p));}

  if(sc.d&&sc.d.length>0)showBubble(sc.d[0].s,sc.d[0].t);

  if(sc.na){setTimeout(()=>{showNarr(sc.na);setTimeout(()=>showChoices(sc),1200);},(sc.d?sc.d.length*1800:500));}
  else{setTimeout(()=>showChoices(sc),(sc.d?sc.d.length*1800:500));}
}

function showBubble(s,t){
  const i=CH[s]||CH['王老师'];
  document.getElementById('bSpk').innerHTML=`<span style="display:inline-block;width:22px;height:22px;border-radius:50%;background:${i.c}18;text-align:center;line-height:22px;font-size:13px">${i.a}</span><span style="color:${i.c}">${an(s)}</span><span style="font-size:9px;color:var(--sub);margin-left:2px">·${i.r}</span>`;
  document.getElementById('bub').classList.add('show');
  typeText(an(t));
}

function showNarr(t){
  document.getElementById('bSpk').innerHTML='<span style="color:var(--sub);font-weight:700">📋 事件</span>';
  document.getElementById('bub').classList.add('show');
  typeText(an(t));
}

let rt=null;
function typeText(tx){
  const el=document.getElementById('bTxt');let i=0;clearInterval(rt);
  rt=setInterval(()=>{if(i<tx.length){el.innerHTML=tx.substring(0,i+1)+'<span style="display:inline-block;width:2px;height:13px;background:var(--text);margin-left:2px;vertical-align:middle;animation:blink .8s infinite"></span>';i++;}else{clearInterval(rt);el.textContent=tx;}},22);
}

function showChoices(sc){
  const bar=document.getElementById('sCh');const l=['A','B','C'];
  shCh=sh(sc.ch.map((c,i)=>({...c,oi:i})));
  bar.innerHTML=shCh.map((c,i)=>`<button class="sc-btn" id="sc${i}" onclick="sel(${i})"><span class="sl">${l[i]}</span>${an(c.t)}</button>`).join('');
  bar.classList.add('show');
}

function sel(i){
  if(ans)return;ans=true;
  const c=shCh[i];if(!c)return;
  document.querySelectorAll('.sc-btn').forEach(b=>b.disabled=true);
  const btn=document.getElementById('sc'+i),ci=shCh.findIndex(x=>x.ok);
  if(c.ok){btn.classList.add('selected-correct');tSc+=(c.sc||10);okN++;}
  else{btn.classList.add('selected-wrong');if(ci>=0&&ci!==i)document.getElementById('sc'+ci).classList.add('show-correct');tSc+=(c.sc||-5);bdN++;if(c.rk){iR=Math.min(100,iR+c.rk);upR();}if(c.ef&&curP)upP(c.ef);}
  pnx=c.nx;showFb(c,curS);upS();if(iR>=100)setTimeout(()=>trigO(),2000);
}

function showFb(c,sc){
  const fb=document.getElementById('sFb');fb.className='scene-fb show '+(c.ok?'ok':'err');
  fb.innerHTML=`<div style="font-weight:700;margin-bottom:1px">${c.ok?'✅ 正确！':'❌ 错误'}</div><div>${an(c.fb||'')}</div>${sc.kb?`<div style="margin-top:5px;padding:5px 7px;background:rgba(0,0,0,.03);border-radius:4px;font-size:10px">${an(sc.kb)}</div>`:''}`;
  document.getElementById('sNext').classList.add('show');
  document.getElementById('sNext').textContent=pnx==='ending'?'查看总结 ▸':'继续散步 ▸';
}

function continueGame(){
  if(!ans)return;ans=false;
  document.getElementById('bub').classList.remove('show');
  document.getElementById('sCh').classList.remove('show');
  document.getElementById('sFb').classList.remove('show');
  document.getElementById('sNext').classList.remove('show');
  const nx=pnx;pnx=null;
  if(nx==='ending'||(curS&&curS.ed)){showEnd();return;}

  // 走向下一个位置
  const di=['scene1','scene2','scene3','scene4','scene5','scene6','scene7'].indexOf(nx);
  if(di>=0){curSpot=di;walkTo(SPOTS[di]);upSky();}
  setTimeout(()=>goScene(nx),800);
}

function showEnd(){
  curSpot=7;walkTo(85);upSky();
  document.getElementById('bSpk').innerHTML='';
  const ms=70,pct=Math.max(0,Math.round((tSc/ms)*100));
  let st,g,c;
  if(pct>=90){st='⭐⭐⭐⭐⭐';g='优秀';c='医院感染防控知识掌握扎实！';}
  else if(pct>=70){st='⭐⭐⭐⭐';g='良好';c='大部分掌握，继续加强。';}
  else if(pct>=50){st='⭐⭐⭐';g='合格';c='基本概念有，关键判断需改进。';}
  else{st='⭐';g='需加强';c='存在较多盲区，请重新学习。';}
  document.getElementById('bTxt').innerHTML=`<div style="text-align:center;padding:20px 0"><div style="font-size:36px">${st}</div><div style="font-size:20px;font-weight:700;color:${pct>=70?'var(--green)':pct>=50?'#b8860b':'var(--coral)'};margin:8px 0">${g}（${pct}分）</div><div style="font-size:12px;color:var(--sub);line-height:2">✅${okN}题 ❌${bdN}题 ⭐${tSc}/${ms}分</div><div style="font-size:11px;color:var(--sub);margin-top:2px">${c}</div><button onclick="restartGame()" style="margin-top:10px;padding:8px 22px;background:var(--turquoise);color:#fff;border:2.5px solid var(--blue);border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">🔄 重新开始</button></div>`;
  document.getElementById('bub').classList.add('show');
}

// ═══════════════════════════════════════
//  走路 + 天空
// ═══════════════════════════════════════
function walkTo(lp){
  const ch=document.getElementById('ch');ch.classList.add('walking');ch.style.left=lp+'%';
  setTimeout(()=>ch.classList.remove('walking'),700);
}

function upSky(){
  const prog=(curSpot+1)/7;
  const sky=document.getElementById('sky'),sun=document.getElementById('sun');
  if(prog<0.33){sky.className='sky morning';sun.style.left=(10+prog*85)+'%';sun.style.top='8%';sun.style.opacity='1';}
  else if(prog<0.66){sky.className='sky noon';sun.style.left=(38+(prog-.33)*85)+'%';sun.style.top='6%';sun.style.opacity='1';}
  else{sky.className='sky evening';sun.style.left=(66+(prog-.66)*50)+'%';sun.style.top='5%';sun.style.opacity=(1-(prog-.66)*2)+'';}
}

// ═══════════════════════════════════════
//  工具
// ═══════════════════════════════════════
function upR(){
  const inn=document.getElementById('rIn'),pct=document.getElementById('rPct');
  inn.style.width=iR+'%';inn.classList.remove('warn','danger');pct.style.color='var(--green)';
  if(iR>=80){inn.classList.add('danger');pct.style.color='var(--coral)';}
  else if(iR>=50){inn.classList.add('warn');pct.style.color='var(--yellow)';}
  pct.textContent=iR+'%';
}
function upS(){document.getElementById('ok').textContent=okN;document.getElementById('bad').textContent=bdN;document.getElementById('sc').textContent=tSc;}
function upP(ef){
  if(!curP)return;
  if(ef.tp)curP.tp=rv(curP.tp+parseFloat(ef.tp));
  if(ef.hr)curP.hr=rv(curP.hr+parseFloat(ef.hr));
  if(ef.sp)curP.sp=rv(curP.sp+parseFloat(ef.sp));
  if(ef.cd)curP.cd=ef.cd;
}
function trigO(){document.getElementById('outOv').classList.add('active');}

// ═══════════════════════════════════════
//  开始 / 重启
// ═══════════════════════════════════════
function startGame(){
  pn=(document.getElementById('pName').value||'小李').trim();
  tSc=okN=bdN=iR=0;curP=null;ans=false;curSpot=-1;
  upS();upR();document.getElementById('introOv').style.display='none';
  document.getElementById('ch').style.left='3%';
  document.getElementById('npc').style.opacity='1';
  // 画护士和角色
  const np=document.getElementById('npc');np.innerHTML='<div class="nhead">👩‍⚕️</div><div class="nbody"></div>';
  const ch=document.getElementById('ch');ch.innerHTML='<div class="head">🧑‍⚕️</div><div class="body"></div>';
  upSky();goScene('prologue');
}
function restartGame(){
  document.getElementById('outOv').classList.remove('active');
  tSc=okN=bdN=iR=0;curP=null;ans=false;curSpot=-1;
  upS();upR();document.getElementById('introOv').style.display='flex';
  document.getElementById('ch').style.left='3%';
  document.getElementById('bub').classList.remove('show');
  document.getElementById('sCh').classList.remove('show');
  document.getElementById('sFb').classList.remove('show');
  document.getElementById('sNext').classList.remove('show');
  upSky();
}

startGame();
</script>
