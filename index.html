<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>隔离防护培训 — 互动剧情</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --bg:#fefae0;--card:#fffef5;--text:#2d2d2d;--sub:#6b6b6b;--border:#e8e4d0;
    --turquoise:#00a8b5;--coral:#ff6b6b;--yellow:#ffd166;--green:#06d6a0;
    --pink:#ff8fa3;--blue:#457b9d;--lavender:#cdb4db;
    --blue-bg:#e0f7f8;--green-bg:#e0faf0;--red-bg:#ffe8e8;--amber-bg:#fff8e0;
    --hk-sky:#a8dadc;--hk-sun:#ffd166;
  }
  body{
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;
    padding:16px;line-height:1.6;
  }
  .app{width:100%;max-width:720px;}

  /* 顶栏 */
  .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .top-bar .title{font-size:18px;font-weight:700;color:var(--text);}
  .top-bar .stats{display:flex;gap:10px;font-size:13px;color:var(--sub);}
  .top-bar .stats span{font-weight:700;}
  .top-bar .stats .ok{color:var(--green);}
  .top-bar .stats .bad{color:var(--red);}
  .top-bar .stats .sc{color:var(--amber);}

  /* 风险条 */
  .risk-line{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
  .risk-line .icon{font-size:14px;}
  .risk-line .bar-outer{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
  .risk-line .bar-inner{height:100%;border-radius:3px;transition:width .5s,background .5s;background:var(--turquoise);}
  .risk-line .bar-inner.warn{background:var(--yellow);}
  .risk-line .bar-inner.danger{background:var(--coral);animation:pulse .6s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .risk-line .pct{font-size:12px;font-weight:700;min-width:30px;text-align:right;}

  /* 场景主区域 */
  .scene-main{
    background:var(--card);border:3px solid var(--blue);border-radius:16px;
    overflow:hidden;box-shadow:5px 5px 0 rgba(0,0,0,.05);
  }

  /* 场景背景图区 */
  .scene-stage{
    position:relative;width:100%;min-height:480px;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
  }
  .scene-stage.has-bg{background-size:cover;background-position:center;}
  /* 默认占位 — 场景图标 */
  .scene-stage .stage-placeholder{
    text-align:center;color:#b0b8c0;position:relative;z-index:1;
  }
  .scene-stage .stage-placeholder .big-icon{font-size:64px;display:block;margin-bottom:8px;}
  .scene-stage .stage-placeholder .loc-text{font-size:14px;}

  /* 场景装饰层（CSS绘制） */
  .scene-decor{position:absolute;inset:0;pointer-events:none;}

  /* 角色图叠加 */
  .scene-stage .char-img{
    position:absolute;bottom:0;max-height:90%;object-fit:contain;
    transition:transform .3s,opacity .3s;z-index:2;
  }
  .scene-stage .char-img.left{left:8%;}
  .scene-stage .char-img.right{right:8%;}
  .scene-stage .char-img.center{left:50%;transform:translateX(-50%);}
  .scene-stage .char-img.speaking{animation:charBounce .5s ease-in-out infinite;}
  @keyframes charBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

  /* 场景内对话气泡 */
  .stage-bubble{
    position:absolute;z-index:10;background:#fffef5;border:3px solid var(--blue);
    border-radius:16px;padding:16px 20px;max-width:75%;
    box-shadow:4px 4px 0 rgba(0,0,0,.06);animation:bubbleIn .3s ease;
  }
  .stage-bubble.left{bottom:140px;left:16px;}
  .stage-bubble.right{bottom:140px;right:16px;}
  .stage-bubble.center{bottom:140px;left:50%;transform:translateX(-50%);}
  .stage-bubble::after{
    content:'';position:absolute;bottom:-14px;width:0;height:0;
    border-left:10px solid transparent;border-right:10px solid transparent;
    border-top:14px solid #333;
  }
  .stage-bubble.left::after{left:30px;}
  .stage-bubble.right::after{right:30px;}
  .stage-bubble.center::after{left:50%;margin-left:-10px;}
  .stage-bubble .bub-speaker{font-size:11px;font-weight:700;margin-bottom:4px;}
  .stage-bubble .bub-text{font-size:14px;color:#333;line-height:1.6;}
  .stage-bubble .bub-text .cursor{display:inline-block;width:2px;height:14px;background:#333;margin-left:2px;vertical-align:text-bottom;animation:blink .8s infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
  @keyframes bubbleIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  /* ── 场景内选项 ──────────────────── */
  .stage-choices{
    position:absolute;bottom:12px;left:12px;right:12px;z-index:15;
    display:flex;gap:8px;flex-wrap:wrap;
  }
  .stage-choices .sc-btn{
    flex:1;min-width:120px;padding:10px 12px;background:#fffef5;border:3px solid var(--blue);
    border-radius:12px;cursor:pointer;font-size:13px;font-family:inherit;
    text-align:center;box-shadow:3px 3px 0 rgba(0,0,0,.06);
    transition:all .12s;color:var(--text);line-height:1.3;
  }
  .stage-choices .sc-btn:hover{background:var(--yellow);transform:translateY(-2px);box-shadow:4px 4px 0 rgba(0,0,0,.08);}
  .stage-choices .sc-btn:disabled{pointer-events:none;opacity:.45;}
  .stage-choices .sc-btn.selected-correct{border-color:var(--green);background:#e0faf0;box-shadow:3px 3px 0 rgba(6,214,160,.15);}
  .stage-choices .sc-btn.selected-wrong{border-color:var(--coral);background:#ffe8e8;box-shadow:3px 3px 0 rgba(255,107,107,.15);}
  .stage-choices .sc-btn.show-correct{border-color:var(--green);border-style:dashed;}
  .stage-choices .sc-btn .sc-letter{font-weight:700;margin-right:4px;color:var(--turquoise);}

  /* ── 场景内反馈横幅 ──────────────── */
  .stage-feedback{
    position:absolute;bottom:70px;left:12px;right:12px;z-index:15;
    padding:10px 14px;border-radius:10px;font-size:12px;
    animation:bubbleIn .3s;display:none;
  }
  .stage-feedback.show{display:block;}
  .stage-feedback.ok{background:#e0faf0;border:2px solid var(--green);color:#1a5a3a;}
  .stage-feedback.err{background:#ffe8e8;border:2px solid var(--coral);color:#7a2020;}
  .stage-feedback .fb-title{font-weight:700;margin-bottom:2px;}

  /* ── 场景内继续按钮 ──────────────── */
  .stage-continue{
    position:absolute;bottom:12px;right:12px;z-index:20;
    padding:10px 24px;background:var(--turquoise);color:#fff;border:3px solid var(--blue);
    border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;
    font-family:inherit;display:none;box-shadow:3px 3px 0 rgba(0,0,0,.08);
  }
  .stage-continue.show{display:block;}
  .stage-continue:hover{background:var(--blue);}

  /* 场景信息条 */
  .scene-info{
    padding:12px 18px;border-bottom:2px solid var(--border);
    display:flex;justify-content:space-between;align-items:center;
    font-size:13px;color:var(--sub);
  }
  .scene-info .badge{
    background:var(--turquoise);color:#fff;padding:2px 12px;
    border-radius:10px;font-size:11px;font-weight:600;
  }

  /* 患者状态卡 */
  .patient-card{
    margin:0 18px 12px;padding:12px 16px;
    background:#fafcf9;border:1px solid var(--border);border-radius:10px;
    display:flex;align-items:center;gap:16px;flex-wrap:wrap;
    transition:background .3s,border-color .3s;
  }
  .patient-card.worsening{background:var(--red-bg);border-color:#f5c6cb;}
  .patient-card .p-name{font-size:13px;font-weight:600;color:var(--text);min-width:100px;}
  .patient-card .vital{text-align:center;}
  .patient-card .vital .v-num{font-size:18px;font-weight:700;color:var(--text);}
  .patient-card .vital .v-label{font-size:10px;color:var(--sub);}
  .patient-card .vital.changed .v-num{color:var(--red);animation:flashNum .6s;}
  @keyframes flashNum{0%,100%{transform:scale(1)}50%{transform:scale(1.25)}}

  /* 对话区 */
  .dialogue-block{
    padding:18px 20px;border-top:1px solid var(--border);
  }
  .dialogue-block .speaker-line{
    display:flex;align-items:center;gap:8px;margin-bottom:8px;
  }
  .dialogue-block .speaker-line .avatar-circle{
    width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:18px;
  }
  .dialogue-block .speaker-line .speaker-name{font-size:14px;font-weight:700;color:var(--text);}
  .dialogue-block .speaker-line .speaker-role{font-size:11px;color:var(--sub);}
  .dialogue-block .dialogue-text{font-size:15px;color:#444;line-height:1.8;min-height:24px;}
  .dialogue-block .dialogue-text .cursor{
    display:inline-block;width:2px;height:16px;background:var(--blue);
    margin-left:2px;vertical-align:text-bottom;animation:blink .8s infinite;
  }
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

  /* 选项 */
  .choices-block{padding:0 20px 18px;display:flex;flex-direction:column;gap:8px;}
  .choice-btn{
    width:100%;padding:13px 16px;text-align:left;
    border:1.5px solid var(--border);border-radius:10px;
    background:var(--card);cursor:pointer;font-size:14px;font-family:inherit;
    color:var(--text);transition:all .15s;display:flex;align-items:center;gap:10px;
  }
  .choice-btn:hover{border-color:var(--blue);background:var(--blue-bg);}
  .choice-btn:disabled{pointer-events:none;opacity:.5;}
  .choice-btn .idx{
    width:26px;height:26px;border-radius:7px;background:#f0ece5;
    display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:12px;color:var(--sub);flex-shrink:0;
  }
  .choice-btn.selected-correct{border-color:var(--green);background:var(--green-bg);}
  .choice-btn.selected-correct .idx{background:#c8e6c9;color:var(--green);}
  .choice-btn.selected-wrong{border-color:var(--red);background:var(--red-bg);}
  .choice-btn.selected-wrong .idx{background:#f5c6cb;color:var(--red);}
  .choice-btn.show-correct{border-color:var(--green);border-style:dashed;}

  /* 反馈 */
  .feedback-note{
    display:none;margin:0 20px 16px;padding:14px 16px;border-radius:10px;font-size:13px;
    animation:slideUp .3s;
  }
  .feedback-note.show{display:block;}
  .feedback-note.ok{background:var(--green-bg);border:1px solid #c8e6c9;color:#2e5a2e;}
  .feedback-note.err{background:var(--red-bg);border:1px solid #f5c6cb;color:#7a2020;}
  .feedback-note .fb-title{font-weight:700;margin-bottom:4px;}
  .feedback-note .knowledge-note{margin-top:8px;padding:8px 10px;background:rgba(0,0,0,.03);border-radius:6px;font-size:12px;line-height:1.7;}
  @keyframes slideUp{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}

  .continue-btn{
    display:none;margin:0 20px 16px;width:calc(100% - 40px);padding:12px;
    background:var(--blue);color:#fff;border:none;border-radius:10px;
    font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;
  }
  .continue-btn.show{display:block;}
  .continue-btn:hover{opacity:.9;}

  /* 开场 */
  .intro-overlay{
    position:fixed;inset:0;background:rgba(30,30,30,.85);
    z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;
  }
  .intro-card{
    background:var(--card);border:4px solid var(--blue);border-radius:20px;
    padding:40px 32px;max-width:400px;width:100%;
    text-align:center;box-shadow:8px 8px 0 rgba(0,168,181,.2);animation:popIn .4s;
  }
  @keyframes popIn{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
  .intro-card .big-icon{font-size:48px;margin-bottom:8px;}
  .intro-card h1{font-size:22px;color:var(--text);margin-bottom:4px;}
  .intro-card .sub{font-size:13px;color:var(--sub);margin-bottom:20px;}
  .intro-card input{
    width:100%;padding:12px;border:1.5px solid var(--border);border-radius:10px;
    font-size:16px;font-family:inherit;text-align:center;outline:none;margin-bottom:14px;
  }
  .intro-card input:focus{border-color:var(--blue);}
  .intro-card .start-btn{
    width:100%;padding:12px;background:var(--turquoise);color:#fff;
    border:3px solid var(--blue);border-radius:10px;font-size:16px;font-weight:700;
    cursor:pointer;font-family:inherit;box-shadow:4px 4px 0 rgba(0,0,0,.06);
  }
  .intro-card .start-btn:hover{background:var(--blue);}

  /* 爆表 */
  .outbreak-overlay{
    display:none;position:fixed;inset:0;background:rgba(180,40,40,.94);
    z-index:200;align-items:center;justify-content:center;padding:20px;
  }
  .outbreak-overlay.active{display:flex;}
  .outbreak-card{
    background:var(--card);border-radius:18px;padding:36px 28px;
    max-width:400px;text-align:center;animation:popIn .4s;
  }
  .outbreak-card .big-icon{font-size:56px;margin-bottom:8px;}
  .outbreak-card h2{font-size:20px;color:var(--red);margin-bottom:8px;}
  .outbreak-card p{font-size:14px;color:#666;margin-bottom:18px;line-height:1.7;}

  /* 响应式 */
  @media(max-width:500px){
    .scene-stage{height:180px;}
    .dialogue-block .dialogue-text{font-size:14px;}
    .choice-btn{font-size:13px;padding:10px 12px;}
  }

  /* 图片缺失时隐藏img标签 */
  .scene-stage img.error{display:none;}
</style>
</head>
<body>

<div class="app" id="app">
  <div class="top-bar">
    <div class="title">🏥 隔离防护培训</div>
    <div class="stats">
      ✅<span class="ok" id="correctCount">0</span>
      ❌<span class="bad" id="wrongCount">0</span>
      ⭐<span class="sc" id="scoreDisplay">0</span>分
    </div>
  </div>

  <div class="risk-line">
    <span class="icon">🦠</span>
    <div class="bar-outer"><div class="bar-inner" id="riskInner" style="width:0%"></div></div>
    <span class="pct" id="riskPercent" style="color:var(--green)">0%</span>
  </div>

  <div class="scene-main" id="sceneMain">
    <div class="scene-stage" id="sceneStage">
      <div class="scene-decor" id="sceneDecor"></div>
      <!-- 角色动态插入 -->
      <!-- 场景内对话气泡 -->
      <div class="stage-bubble left" id="stageBubble" style="display:none">
        <div class="bub-speaker" id="bubSpeaker"></div>
        <div class="bub-text" id="bubText"></div>
      </div>
      <!-- 场景内选项 -->
      <div class="stage-choices" id="stageChoices"></div>
      <!-- 场景内反馈 -->
      <div class="stage-feedback" id="stageFeedback"></div>
      <button class="stage-continue" id="stageContinue" onclick="continueStory()">继续 ▸</button>
    </div>
    <div class="scene-info">
      <span id="sceneBadge"></span>
      <span id="sceneTitle"></span>
    </div>
    <div class="patient-card" id="patientCard" style="display:none"></div>
  </div>
</div>

<div class="intro-overlay" id="introOverlay">
  <div class="intro-card">
    <div class="big-icon">🏥</div>
    <h1>隔离防护培训</h1>
    <div class="sub">互动剧情 · 临床场景模拟</div>
    <input type="text" id="playerName" placeholder="输入你的名字" value="小李" maxlength="10">
    <button class="start-btn" onclick="startGame()">开始培训 ▸</button>
  </div>
</div>

<div class="outbreak-overlay" id="outbreakOverlay">
  <div class="outbreak-card">
    <div class="big-icon">⚠️</div>
    <h2>院内感染爆发！</h2>
    <p>多次防护措施不当，病原体在病区内扩散。<br>感染风险达到<b style="color:var(--red)">100%</b></p>
    <button class="start-btn" style="background:var(--red)" onclick="restartAfterOutbreak()">🔄 重新开始</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════
//  图片配置 —— 把AI生成的图放在桌面，改这里的路径即可
// ═══════════════════════════════════════

const IMAGES = {
  // 背景图（不设置则用CSS渐变）
  bg_hospital:   '',  // 例如: 'bg_hospital.png'
  bg_clinic:     '',  // 例如: 'bg_clinic.png'
  bg_treatment:  '',
  bg_buffer:     '',

  // 角色图
  char_nurse:    '',  // 例如: 'nurse_wang.png'
  char_intern:   '',  // 例如: 'intern_li.png'
  char_patient:  '',  // 例如: 'patient.png'
};

function imgPath(name){
  return IMAGES[name] || '';
}

// ═══════════════════════════════════════
//  场景数据
// ═══════════════════════════════════════

function roundVital(v){return Math.round(v*10)/10;}

const CHARACTERS={
  '王老师':{color:'#2c6faa',avatar:'👩‍⚕️',role:'护士长',img:'char_nurse'},
  '{name}': {color:'#3a8a5c',avatar:'🧑‍⚕️',role:'实习生',img:'char_intern'},
  '患者':   {color:'#c7852a',avatar:'😷',role:'患者',img:'char_patient'},
};

const STORY={
  // ═══════════════════════════════════════════
  //  序章
  // ═══════════════════════════════════════════
  prologue:{id:'prologue',bg:'bg_hospital',stageIcon:'🏥',loc:'市第一人民医院',title:'序章 · 入职第一天',
    cast:['王老师'],dialogues:[
      {s:'王老师',t:'{name}，欢迎来到感染科实习。在你踏入病房之前，有件事必须记住。'},
      {s:'王老师',t:'医院感染防控有两件事同样重要——<b>保护患者不受感染</b>，和<b>保护自己不被暴露</b>。'},
      {s:'王老师',t:'今天我带你走一遍，每一个决定的背后，都可能是生与死的差别。准备好了吗？'},
    ],choices:[{text:'我准备好了，请王老师带路！',correct:true,score:0,next:'scene1'}]
  },

  // ═══════════════════════════════════════════
  //  第一部分：保护患者不受感染
  // ═══════════════════════════════════════════

  scene1:{id:'scene1',bg:'bg_hospital',stageIcon:'🚪',loc:'病房区入口',title:'Part1 · 保护患者 | 场景1/7 · 手卫生',
    patient:{name:'病区整体环境',temp:37.0,hr:80,spo2:98,condition:'病区目前平稳。但你的双手可能携带病原体——它们对免疫力低下的患者是致命威胁。'},
    cast:['王老师'],dialogues:[
      {s:'王老师',t:'{name}，病房里住着术后患者、化疗患者、新生儿——他们的免疫系统很脆弱。'},
      {s:'王老师',t:'你手上看不见的细菌，对他们来说可能致命。现在，进病房前你该怎么做？'},
    ],knowledge:'<b>📖 保护患者——手卫生</b><br>你的双手是病原体传播最常见的媒介。WHO五大手卫生时刻：接触患者前、无菌操作前、接触体液后、接触患者后、接触环境后。保护患者的第一步，就是清洁你的双手。',
    choices:[
      {text:'用速干手消毒剂，六步洗手法认真揉搓',correct:true,score:10,feedback:'✅ 很好！手卫生是保护患者最基础也最重要的屏障。每一个走进病房的人，都可能是病原体的携带者。',next:'scene2'},
      {text:'戴手套就行，手套是 sterile 的，不用洗手',correct:false,score:-5,risk:10,effects:{temp:'+0.3',hr:'+5',spo2:'-1',c:'⚠ 手套可能有微小的肉眼不可见的破损'},feedback:'❌ 戴手套前的手卫生同样重要——如果你的手不干净，戴手套的过程就会污染手套外表面。',next:'scene2'},
      {text:'我只是去看看患者，不碰他，不用洗手',correct:false,score:-5,risk:15,effects:{temp:'+0.5',hr:'+8',spo2:'-2',c:'病原体可以通过接触环境表面传播'},feedback:'❌ 即使不直接接触患者，你也会接触门把手、床栏、床头柜——病原体可以在这些表面存活数小时到数天。',next:'scene2'},
    ]

function drawDecor(sceneId){
  const m={
    prologue:'hospital',scene1:'hospital',scene2:'hospital',
    scene3:'clinic',scene4:'clinic',scene5:'buffer',
    scene6:'treatment',scene7:'hospital',ending:'hospital'
  };
  const type=m[sceneId]||'hospital';
  if(type==='hospital')drawDecorHospital();
  else if(type==='clinic')drawDecorClinic();
  else if(type==='treatment')drawDecorTreatment();
  else if(type==='buffer')drawDecorBuffer();
}

function setStage(scene){
  const stage=document.getElementById('sceneStage');
  const ph=document.getElementById('stagePlaceholder');

  // 清角色图
  stage.querySelectorAll('.char-img').forEach(e=>e.remove());

  // 背景图
  const bgKey=scene.bg||'';
  const bgPath=imgPath(bgKey);
  if(bgPath){
    stage.classList.add('has-bg');
    stage.style.backgroundImage=`url(${bgPath})`;
    if(ph)ph.style.display='none';
    document.getElementById('sceneDecor').innerHTML='';
  }else{
    stage.classList.remove('has-bg');
    stage.style.backgroundImage='';
    if(ph)ph.style.display='none';
    drawDecor(currentSceneId);
  }

  // 场景信息
  document.getElementById('sceneBadge').textContent=scene.title||'';
  document.getElementById('sceneTitle').textContent='';

  // 角色
  if(scene.cast){
    scene.cast.forEach((name,i)=>{
      const info=CHARACTERS[name]||CHARACTERS['王老师'];
      const charPath=imgPath(info.img);
      const pos=i===0?'left':(i===1?'right':'center');
      if(charPath){
        // 有图片就用图片
        const img=document.createElement('img');
        img.className=`char-img ${pos}`;
        img.src=charPath;
        img.alt=applyName(name);
        img.onerror=function(){this.classList.add('error');};
        stage.appendChild(img);
      }else{
        // 没图片就用大号角色卡
        const div=document.createElement('div');
        div.className=`char-img ${pos}`;
        div.style.cssText=`display:flex;flex-direction:column;align-items:center;gap:4px;`;
        div.innerHTML=`
          <div style="width:70px;height:70px;border-radius:50%;background:${info.color}18;border:3px solid ${info.color}40;display:flex;align-items:center;justify-content:center;font-size:40px;box-shadow:0 4px 16px rgba(0,0,0,.08);">${info.avatar}</div>
          <div style="font-size:11px;font-weight:700;color:var(--text);background:var(--card);padding:2px 10px;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.06);">${applyName(name)}</div>
          <div style="font-size:9px;color:var(--sub);">${info.role}</div>
        `;
        div.id='char-'+applyName(name);
        stage.appendChild(div);
      }
    });
  }
}

function showPatientCard(patient,effects){
  const card=document.getElementById('patientCard');
  if(!patient){card.style.display='none';return;}
  if(effects){
    if(effects.temp)patient.temp=roundVital(patient.temp+parseFloat(effects.temp));
    if(effects.hr)patient.hr=roundVital(patient.hr+parseFloat(effects.hr));
    if(effects.spo2)patient.spo2=roundVital(patient.spo2+parseFloat(effects.spo2));
    if(effects.c)patient.condition=effects.c;
  }
  currentPatient=patient;
  card.style.display='flex';
  if(effects)card.classList.add('worsening');else card.classList.remove('worsening');
  card.innerHTML=`
    <div class="p-name">🩺 ${patient.name}</div>
    <div class="vital" id="vital-temp"><div class="v-num">${patient.temp.toFixed(1)}°C</div><div class="v-label">体温</div></div>
    <div class="vital" id="vital-hr"><div class="v-num">${patient.hr}</div><div class="v-label">心率</div></div>
    <div class="vital" id="vital-spo2"><div class="v-num">${patient.spo2}%</div><div class="v-label">血氧</div></div>
    <div style="font-size:12px;color:var(--sub);max-width:200px">${patient.condition}</div>
  `;
  if(effects){
    if(effects.temp)flashVital('vital-temp');
    if(effects.hr)flashVital('vital-hr');
    if(effects.spo2)flashVital('vital-spo2');
  }
}

function flashVital(id){setTimeout(()=>{const e=document.getElementById(id);if(e){e.classList.add('changed');setTimeout(()=>e.classList.remove('changed'),600);}},100);}

function showDialogue(speaker,text,bubblePos){
  const info=CHARACTERS[speaker]||CHARACTERS['王老师'];
  const bubble=document.getElementById('stageBubble');
  const pos=bubblePos||'left';
  bubble.className='stage-bubble '+pos;
  bubble.style.display='block';
  document.getElementById('bubSpeaker').innerHTML=`<span style="color:${info.color}">${applyName(speaker)}</span> · ${info.role}`;
  document.getElementById('stageChoices').innerHTML='';
  document.getElementById('stageFeedback').classList.remove('show');
  document.getElementById('stageContinue').classList.remove('show');
  typeText(applyName(text));

  // 高亮说话角色
  document.querySelectorAll('.char-img').forEach(el=>{
    el.classList.remove('speaking');
    const name=el.alt||el.id?.replace('char-','');
    if(name===applyName(speaker))el.classList.add('speaking');
  });
}

function typeText(text){
  const el=document.getElementById('bubText');
  el.classList.remove('done');let i=0;
  clearInterval(typingTimer);
  typingTimer=setInterval(()=>{
    if(i<text.length){el.innerHTML=text.substring(0,i+1)+'<span class="cursor"></span>';i++;}
    else{clearInterval(typingTimer);el.classList.add('done');el.textContent=text;}
  },25);
}
let typingTimer=null;

function showChoices(scene){
  const bar=document.getElementById('stageChoices');
  const letters=['A','B','C'];
  shuffledChoices=shuffle(scene.choices.map((c,i)=>({...c,origIndex:i})));
  bar.innerHTML=shuffledChoices.map((c,i)=>`
    <button class="sc-btn" id="choice${i}" onclick="selectChoice(${i})">
      <span class="sc-letter">${letters[i]}</span>${applyName(c.text)}
    </button>
  `).join('');
  document.getElementById('stageBubble').style.display='none';
  document.getElementById('stageFeedback').classList.remove('show');
  document.getElementById('stageContinue').classList.remove('show');
}

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function showFeedback(choice,scene){
  const fb=document.getElementById('stageFeedback');
  fb.className='stage-feedback show '+(choice.correct?'ok':'err');
  fb.innerHTML=`
    <div class="fb-title">${choice.correct?'✅ 正确！':'❌ 错误'}</div>
    <div>${applyName(choice.feedback||'')}</div>
    ${scene.knowledge?`<div style="margin-top:6px;padding:6px 8px;background:rgba(0,0,0,.04);border-radius:4px;font-size:11px">${applyName(scene.knowledge)}</div>`:''}
  `;
  document.getElementById('stageContinue').classList.add('show');
  document.getElementById('stageContinue').textContent=choice.next==='ending'?'查看培训总结 ▸':'继续 ▸';
  document.getElementById('stageChoices').innerHTML='';
}

// ═══════════════════════════════════════
//  引擎
// ═══════════════════════════════════════

function renderScene(sceneId){
  const scene=getScene(sceneId);if(!scene)return;
  currentSceneId=sceneId;answered=false;
  document.getElementById('stageChoices').innerHTML='';
  document.getElementById('stageFeedback').classList.remove('show','ok','err');
  document.getElementById('stageFeedback').innerHTML='';
  document.getElementById('stageContinue').classList.remove('show');
  document.getElementById('stageBubble').style.display='none';
  document.querySelectorAll('.char-img').forEach(e=>e.classList.remove('speaking'));

  setStage(scene);
  if(scene.patient)showPatientCard(JSON.parse(JSON.stringify(scene.patient)),null);
  else document.getElementById('patientCard').style.display='none';

  // 判断对话气泡位置
  const bubblePos=scene.cast&&scene.cast[0]==='患者'?'right':'left';

  if(scene.dialogues&&scene.dialogues.length>0)showDialogue(scene.dialogues[0].s,scene.dialogues[0].t,bubblePos);

  if(scene.narrativeAfter){
    setTimeout(()=>{
      document.getElementById('bubSpeaker').innerHTML='<span style="color:var(--sub);font-weight:700">📋 事件</span>';
      typeText(applyName(scene.narrativeAfter));
      setTimeout(()=>showChoices(scene),1200);
    },(scene.dialogues?scene.dialogues.length*1800:500));
  }else{
    setTimeout(()=>showChoices(scene),(scene.dialogues?scene.dialogues.length*1800:500));
  }
}

let pendingNextId=null;

function selectChoice(index){
  if(answered)return;answered=true;
  const scene=getScene(currentSceneId);
  const choice=shuffledChoices[index];if(!choice)return;
  document.querySelectorAll('.sc-btn').forEach(b=>b.disabled=true);

  const selectedBtn=document.getElementById('choice'+index);
  const correctSi=shuffledChoices.findIndex(c=>c.correct);

  if(choice.correct){
    selectedBtn.classList.add('selected-correct');
    totalScore+=(choice.score||10);correctTotal++;
  }else{
    selectedBtn.classList.add('selected-wrong');
    if(correctSi>=0&&correctSi!==index){
      document.getElementById('choice'+correctSi).classList.add('show-correct');
    }
    totalScore+=(choice.score||-5);wrongTotal++;
    if(choice.risk){infectionRisk=Math.min(100,infectionRisk+choice.risk);updateRiskBar();}
    if(choice.effects&&currentPatient)showPatientCard(currentPatient,choice.effects);
  }

  // 保存下一个场景，因为showFeedback会清除按钮
  pendingNextId=choice.next;
  showFeedback(choice,scene);
  updateStats();
  if(infectionRisk>=100)setTimeout(()=>triggerOutbreak(),2000);
}

function continueStory(){
  if(!answered)return;
  const scene=getScene(currentSceneId);
  const nextId=pendingNextId||(shuffledChoices.length>0?shuffledChoices[0].next:'scene1');
  pendingNextId=null;
  if(nextId==='ending'||scene.ending)renderEnding();
  else renderScene(nextId);
}

function renderEnding(){
  const scene=getScene('ending');
  setStage(scene);
  document.getElementById('patientCard').style.display='none';
  document.getElementById('stageChoices').innerHTML='';
  document.getElementById('stageFeedback').classList.remove('show');
  document.getElementById('stageContinue').classList.remove('show');
  document.getElementById('stageBubble').style.display='none';
  document.getElementById('sceneBadge').textContent='🎓 培训完成';
  document.getElementById('sceneTitle').textContent='';

  const maxScore=70,percentage=Math.max(0,Math.round((totalScore/maxScore)*100));
  let stars,grade,comment;
  if(percentage>=90){stars='⭐⭐⭐⭐⭐';grade='优秀';comment='隔离防护知识掌握扎实！';}
  else if(percentage>=70){stars='⭐⭐⭐⭐';grade='良好';comment='大部分掌握，个别需加强。';}
  else if(percentage>=50){stars='⭐⭐⭐';grade='合格';comment='基本概念有，但关键判断有误。';}
  else{stars='⭐';grade='需加强';comment='存在较多盲区，请重新学习。';}

  // 终章在气泡中显示
  const bubble=document.getElementById('stageBubble');
  bubble.className='stage-bubble center';
  bubble.style.display='block';
  document.getElementById('bubSpeaker').innerHTML='';
  document.getElementById('bubText').innerHTML=`
    <div style="text-align:center">
      <div style="font-size:36px;margin-bottom:6px">${stars}</div>
      <div style="font-size:20px;font-weight:700;color:${percentage>=70?'var(--green)':percentage>=50?'var(--amber)':'var(--red)'};margin-bottom:10px">${grade}（${percentage}分）</div>
      <div style="font-size:13px;color:var(--sub);line-height:2">
        ✅ 答对：<b>${correctTotal}</b> | ❌ 答错：<b>${wrongTotal}</b><br>⭐ 总分：<b>${totalScore}</b> / ${maxScore}
      </div>
      <div style="font-size:12px;color:var(--sub);margin-top:6px">${comment}</div>
      <button onclick="restartGame()" style="margin-top:12px;padding:8px 28px;background:#333;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">🔄 重新开始</button>
    </div>
  `;
}

function restartAfterOutbreak(){
  document.getElementById('outbreakOverlay').classList.remove('active');
  totalScore=correctTotal=wrongTotal=infectionRisk=0;currentPatient=null;answered=false;
  updateStats();updateRiskBar();
  document.getElementById('stageChoices').innerHTML='';
  document.getElementById('stageFeedback').classList.remove('show');
  document.getElementById('stageContinue').classList.remove('show');
  document.getElementById('stageBubble').style.display='none';
  renderScene('prologue');
}

// ═══════════════════════════════════════
//  风险 & 状态
// ═══════════════════════════════════════

function updateRiskBar(){
  const inner=document.getElementById('riskInner');
  const pct=document.getElementById('riskPercent');
  inner.style.width=infectionRisk+'%';
  inner.classList.remove('warn','danger');pct.style.color='var(--green)';
  if(infectionRisk>=80){inner.classList.add('danger');pct.style.color='var(--red)';}
  else if(infectionRisk>=50){inner.classList.add('warn');pct.style.color='var(--amber)';}
  pct.textContent=infectionRisk+'%';
}

function updateStats(){
  document.getElementById('correctCount').textContent=correctTotal;
  document.getElementById('wrongCount').textContent=wrongTotal;
  document.getElementById('scoreDisplay').textContent=totalScore;
}

function triggerOutbreak(){document.getElementById('outbreakOverlay').classList.add('active');}

function restartAfterOutbreak(){
  document.getElementById('outbreakOverlay').classList.remove('active');
  totalScore=correctTotal=wrongTotal=infectionRisk=0;currentPatient=null;answered=false;
  updateStats();updateRiskBar();
  document.getElementById('choicesBlock').innerHTML='';
  document.getElementById('feedbackNote').classList.remove('show');
  document.getElementById('continueBtn').classList.remove('show');
  renderScene('prologue');
}

function startGame(){
  playerName=(document.getElementById('playerName').value||'小李').trim();
  totalScore=correctTotal=wrongTotal=infectionRisk=0;currentPatient=null;answered=false;
  updateStats();updateRiskBar();
  document.getElementById('introOverlay').style.display='none';
  renderScene('prologue');
}

function restartGame(){
  totalScore=correctTotal=wrongTotal=infectionRisk=0;currentPatient=null;answered=false;
  updateStats();updateRiskBar();
  document.getElementById('stageChoices').innerHTML='';
  document.getElementById('stageFeedback').classList.remove('show');
  document.getElementById('stageContinue').classList.remove('show');
  document.getElementById('stageBubble').style.display='none';
  document.getElementById('introOverlay').style.display='flex';
}

updateStats();
</script>
